<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <script src="https://kit.fontawesome.com/3d4b55021f.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="login.css">
</head>
<body>
<header></header>
<main>
    <h1>KOREA MARKET</h1>
    <form>
        <section id="login-info-section">
            <label id="id">
                <i class="fa-solid fa-user"></i>
                <input type="text">
            </label>
            <label id="password">
                <i class="fa-solid fa-lock"></i>
                <input type="password">
                <i class="fa-solid fa-eye"></i>
            </label>
        </section>
        <section id="login-id-remember">
            <label>
                <input type="checkbox">
                <span>아이디 저장</span>
            </label>
        </section>
        <button id="login-btn">로그인</button>
    </form>
    <section id="nav-section">
        <a href="#">아이디 찾기</a>
        <a href="#">비밀번호 재설정</a>
        <a href="#">회원가입</a>
    </section>
    <section id="simple-login-section">
        <h4>간편 로그인</h4>
        <div id="external-site-btn">
            <a href="#"><img src="icon/google-login.png" height="40" width="40"/></a>
            <a href="#"><img src="icon/naver-login.png" height="200" width="200"/></a>
            <a href="#"><img src="icon/kakao-login.png" height="35" width="34"/></a>
        </div>

    </section>
</main>
<footer></footer>
</body>
</html>
